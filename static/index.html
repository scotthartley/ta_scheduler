async function importClassList() {
  try {
    const r = await fetch('/api/import-csv', { method: 'POST' });
    const result = await r.json();
    if (result.cancelled) return;
    if (result.error) { alert('Import failed:\n' + result.error); return; }
    const grad = result.grad_courses || [];
    const undergrad = result.undergrad_courses || [];
    if (!grad.length && !undergrad.length) {
      alert('No courses with meeting times found.'); return;
    }
    const examCourses = result.exam_courses || [];
    S._importGrad    = grad;
    const _existingGrad = new Set(
      S.data.grad_courses.map(c => `${c.name}|${c.section||''}`)
    );
    S._importGradChk = new Set(
      grad.reduce((acc, c, i) => {
        if (!_existingGrad.has(`${c.name}|${c.section||''}`)) acc.push(i);
        return acc;
      }, [])
    );
    S._importCourses = undergrad;
    S._importChecked = new Set();                       // none checked by default
    S._importExamCourses = examCourses;
    S._importExamChecked = new Set();                   // none checked by default
    showModal(`<div class="modal-box">
      <h2>Import Class List</h2>
      ${grad.length ? `
        <h3 style="font-size:13px;font-weight:600;margin:12px 0 4px;">Graduate Courses (${grad.length})</h3>
        <div style="margin-bottom:6px;">
          <button class="btn-sm" onclick="importSelectAllGrad(true)">Select All</button>
          <button class="btn-sm" onclick="importSelectAllGrad(false)">Deselect All</button>
        </div>
        <div id="import-grad-list" style="max-height:180px;overflow-y:auto;font-size:13px;margin-bottom:4px;"></div>
      ` : ''}
      ${undergrad.length ? `
        <h3 style="font-size:13px;font-weight:600;margin:12px 0 4px;">Lab Sections</h3>
        <p style="font-size:12px;color:var(--text2);margin:0 0 6px;">Select courses to import all sections:</p>
        <div style="margin-bottom:6px;">
          <button class="btn-sm" onclick="importLabSelectAll(true)">Select All</button>
          <button class="btn-sm" onclick="importLabSelectAll(false)">Deselect All</button>
        </div>
        <div id="import-lab-list" style="max-height:180px;overflow-y:auto;font-size:13px;margin-bottom:4px;"></div>
      ` : ''}
      ${examCourses.length ? `
        <h3 style="font-size:13px;font-weight:600;margin:12px 0 4px;">Courses with Exams (${examCourses.length})</h3>
        <p style="font-size:12px;color:var(--text2);margin:0 0 6px;">Import exam sessions for proctoring:</p>
        <div style="margin-bottom:6px;">
          <button class="btn-sm" onclick="importExamSelectAll(true)">Select All</button>
          <button class="btn-sm" onclick="importExamSelectAll(false)">Deselect All</button>
        </div>
        <div id="import-exam-list" style="max-height:180px;overflow-y:auto;font-size:13px;margin-bottom:4px;"></div>
      ` : ''}
      <div class="modal-footer">
        <button class="btn-sm" onclick="closeModal()">Cancel</button>
        <button class="btn-sm btn-primary" onclick="confirmImportAll()">Import Selected</button>
      </div>
    </div>`);
  } catch(e) { alert('Import failed: ' + e); }
}

function renderImportGradList() {
  const div = $id('import-grad-list'); if (!div) return;
  div.innerHTML = (S._importGrad || []).map((c, i) => {
    const chk = S._importGradChk.has(i) ? ' checked' : '';
    const dname = c.section ? `${escHtml(c.name)} ${escHtml(c.section)}` : escHtml(c.name);
    const meetStr = (c.meetings?.length ? c.meetings : [{day:c.day, start_min:c.start_min, end_min:c.end_min}])
      .map(m => `${DAYS[m.day]} ${fmtRange(m.start_min, m.end_min)}`).join(', ');
    return `<div style="padding:4px 0;border-bottom:1px solid #eee;">
      <label style="cursor:pointer;display:flex;align-items:baseline;gap:5px;">
        <input type="checkbox" data-grad-idx="${i}"${chk}> ${dname} — ${meetStr}
      </label></div>`;
  }).join('');
  div.querySelectorAll('input[data-grad-idx]').forEach(cb => {
    const i = parseInt(cb.dataset.gradIdx);
    cb.onchange = () => { if (cb.checked) S._importGradChk.add(i); else S._importGradChk.delete(i); };
  });
}

function importSelectAllGrad(checked) {
  S._importGradChk = new Set(checked ? (S._importGrad||[]).map((_,i)=>i) : []);
  renderImportGradList();
}

function renderImportLabList() {
  const div = $id('import-lab-list'); if (!div) return;
  div.innerHTML = (S._importCourses || []).map(course => {
    const key = `${course.subject} ${course.number}`;
    const chk = S._importChecked.has(key) ? ' checked' : '';
    return `<div style="padding:4px 0;border-bottom:1px solid #eee;">
      <label style="cursor:pointer;display:flex;align-items:baseline;gap:5px;">
        <input type="checkbox" data-lab-key="${escHtml(key)}"${chk}>
        ${escHtml(key)} — ${escHtml(course.title)} (${course.sections.length} section(s))
      </label></div>`;
  }).join('');
  div.querySelectorAll('input[data-lab-key]').forEach(cb => {
    const key = cb.dataset.labKey;
    cb.onchange = () => { if (cb.checked) S._importChecked.add(key); else S._importChecked.delete(key); };
  });
}

function importLabSelectAll(checked) {
  S._importChecked = new Set(checked ? (S._importCourses||[]).map(c=>`${c.subject} ${c.number}`) : []);
  renderImportLabList();
}

function renderImportExamList() {
  const div = $id('import-exam-list'); if (!div) return;
  div.innerHTML = (S._importExamCourses||[]).map(course => {
    const chk = S._importExamChecked.has(course.name) ? ' checked' : '';
    return `<div style="padding:4px 0;border-bottom:1px solid #eee;">
      <label style="cursor:pointer;display:flex;align-items:baseline;gap:5px;">
        <input type="checkbox" data-exam-key="${escHtml(course.name)}"${chk}>
        ${escHtml(course.name)} (${course.exams.length} exam${course.exams.length>1?'s':''})
      </label></div>`;
  }).join('');
  div.querySelectorAll('input[data-exam-key]').forEach(cb => {
    const key = cb.dataset.examKey;
    cb.onchange = () => { if (cb.checked) S._importExamChecked.add(key); else S._importExamChecked.delete(key); };
  });
}

function importExamSelectAll(checked) {
  S._importExamChecked = new Set(checked ? (S._importExamCourses||[]).map(c=>c.name) : []);
  renderImportExamList();
}

function confirmImportAll() {
  const conflicts = [];
  // Check grad course conflicts
  (S._importGrad || []).forEach((c, i) => {
    if (!S._importGradChk.has(i)) return;
    const key = `${c.name}|${c.section||''}`;
    const existing = S.data.grad_courses.find(x => `${x.name}|${x.section||''}` === key);
    if (existing) {
      const dname = c.section ? `${c.name} ${c.section}` : c.name;
      conflicts.push({ type: 'grad', key, label: `Grad: ${dname}`, idx: i, incoming: c, existingId: existing.id });
    }
  });
  // Check lab section conflicts
  (S._importCourses || []).forEach(course => {
    const courseKey = `${course.subject} ${course.number}`;
    if (!S._importChecked.has(courseKey)) return;
    course.sections.forEach(sec => {
      const key = `${sec.name}|${sec.section||''}`;
      const existing = S.data.labs.find(x => `${x.name}|${x.section||''}` === key);
      if (existing) {
        conflicts.push({ type: 'lab', key, label: `Lab: ${sec.name}${sec.section ? ' ' + sec.section : ''}`, incoming: sec, existingId: existing.id });
      }
    });
  });
  // Check exam course conflicts
  S.data.exams = S.data.exams || [];
  (S._importExamCourses || []).forEach(course => {
    if (!S._importExamChecked.has(course.name)) return;
    const hasExisting = S.data.exams.some(x => x.course_name === course.name);
    if (hasExisting) {
      conflicts.push({ type: 'exam', key: course.name, label: `Exams: ${course.name}`, incoming: course });
    }
  });

  if (conflicts.length === 0) {
    performImport(new Set());
  } else {
    S._importConflicts = conflicts;
    showConflictDialog(conflicts);
  }
}

function performImport(overwriteSet) {
  (S._importGrad || []).forEach((c, i) => {
    if (!S._importGradChk.has(i)) return;
    const key = `${c.name}|${c.section||''}`;
    const existingIdx = S.data.grad_courses.findIndex(x => `${x.name}|${x.section||''}` === key);
    if (existingIdx >= 0) {
      if (!overwriteSet.has(key)) return;
      const ex = S.data.grad_courses[existingIdx];
      ex.day = c.day; ex.start_min = c.start_min; ex.end_min = c.end_min;
      ex.meetings = c.meetings || []; ex.exams = c.exams || [];
      ex.date_start = c.date_start || ''; ex.date_end = c.date_end || '';
    } else {
      S.data.grad_courses.push({id: uid(), name: c.name, section: c.section || '', day: c.day,
        start_min: c.start_min, end_min: c.end_min, meetings: c.meetings || [], exams: c.exams || [],
        date_start: c.date_start || '', date_end: c.date_end || ''});
    }
  });
  (S._importCourses || []).forEach(course => {
    const courseKey = `${course.subject} ${course.number}`;
    if (!S._importChecked.has(courseKey)) return;
    course.sections.forEach(sec => {
      const key = `${sec.name}|${sec.section||''}`;
      const existingIdx = S.data.labs.findIndex(x => `${x.name}|${x.section||''}` === key);
      if (existingIdx >= 0) {
        if (!overwriteSet.has(key)) return;
        const ex = S.data.labs[existingIdx];
        ex.day = sec.day; ex.start_min = sec.start_min; ex.end_min = sec.end_min;
        ex.meetings = sec.meetings || []; ex.exams = sec.exams || [];
        ex.date_start = sec.date_start || ''; ex.date_end = sec.date_end || '';
      } else {
        S.data.labs.push({id: uid(), name: sec.name, section: sec.section || '', day: sec.day,
          start_min: sec.start_min, end_min: sec.end_min,
          meetings: sec.meetings || [], exams: sec.exams || [], roles: [],
          date_start: sec.date_start || '', date_end: sec.date_end || ''});
      }
    });
  });
  S.data.exams = S.data.exams || [];
  (S._importExamCourses || []).forEach(course => {
    if (!S._importExamChecked.has(course.name)) return;
    const hasExisting = S.data.exams.some(x => x.course_name === course.name);
    if (hasExisting) {
      if (!overwriteSet.has(course.name)) return;
      S.data.exams = S.data.exams.filter(x => x.course_name !== course.name);
    }
    course.exams.forEach(ex => {
      S.data.exams.push({
        id: uid(), name: 'Exam', course_name: course.name,
        date: ex.date, start_min: ex.start_min, end_min: ex.end_min,
        pe_value: 1.0, proctor_count: 1
      });
    });
  });
  delete S._importGrad; delete S._importGradChk;
  delete S._importCourses; delete S._importChecked;
  delete S._importExamCourses; delete S._importExamChecked;
  delete S._importConflicts; delete S._conflictOverwrite;
  markDirty(); closeModal(); renderLeftPanel();
}

function showConflictDialog(conflicts) {
  closeModal();
  S._conflictOverwrite = new Set(conflicts.map(c => c.key));
  const rows = conflicts.map(c => `
    <div style="padding:4px 0;border-bottom:1px solid #eee;">
      <label style="cursor:pointer;display:flex;align-items:baseline;gap:5px;">
        <input type="checkbox" data-conflict-key="${escHtml(c.key)}" checked>
        ${escHtml(c.label)}
      </label>
    </div>`).join('');
  showModal(`<div class="modal-box">
    <h2>Import Conflicts (${conflicts.length} item${conflicts.length > 1 ? 's' : ''} already exist)</h2>
    <p style="font-size:13px;color:var(--text2);margin:0 0 8px;">Checked items will be overwritten. Uncheck to keep existing data.</p>
    <div style="max-height:260px;overflow-y:auto;font-size:13px;margin-bottom:8px;">${rows}</div>
    <div class="modal-footer">
      <button class="btn-sm" onclick="closeModal()">Cancel</button>
      <button class="btn-sm" onclick="performImport(new Set())">Skip All</button>
      <button class="btn-sm" onclick="performImport(new Set((S._importConflicts||[]).map(c=>c.key)))">Overwrite All</button>
      <button class="btn-sm btn-primary" onclick="conflictConfirm()">Confirm Import</button>
    </div>
  </div>`);
  document.querySelectorAll('input[data-conflict-key]').forEach(cb => {
    cb.onchange = () => toggleConflict(cb);
  });
}

function toggleConflict(cb) {
  const key = cb.dataset.conflictKey;
  if (cb.checked) S._conflictOverwrite.add(key); else S._conflictOverwrite.delete(key);
}


function conflictConfirm() {
  performImport(S._conflictOverwrite || new Set());
}

function jumpCalToExam(exam) {
  if (exam && !exam.tbd && exam.date) {
    const d = new Date(exam.date + 'T00:00:00');
    if (!isNaN(d)) {
      S.examCalYear  = d.getFullYear();
      S.examCalMonth = d.getMonth();
    }
  }
}

function renderExamsTab() {
  if (S.examSelId) {
    const selExam = S.data.exams.find(e => e.id === S.examSelId);
    jumpCalToExam(selExam);
  }
  renderExamList();
  renderExamCalendar();
  if (S.examSelId) renderExamForm(S.data.exams.find(e=>e.id===S.examSelId));
  else $id('exam-form').style.display = 'none';
}

function renderExamList() {
  const list = $id('exam-list');
  list.innerHTML = '';
  const sorted = [...(S.data.exams||[])].sort((a, b) => {
    if (a.tbd && !b.tbd) return 1;
    if (!a.tbd && b.tbd) return -1;
    if (a.date !== b.date) return (a.date||'') < (b.date||'') ? -1 : 1;
    return (a.start_min||0) - (b.start_min||0);
  });
  sorted.forEach(exam => {
    const row = el('div','item-row'+(exam.id===S.examSelId?' selected':''));
    row.onclick = () => { S.examSelId = exam.id; jumpCalToExam(exam); renderExamsTab(); };
    const courseLabel = exam.course_name
      ? (exam.section ? `${exam.course_name} ${exam.section}` : exam.course_name)
      : '';
    const displayName = courseLabel
      ? `${courseLabel}: ${exam.name||'(unnamed)'}`
      : (exam.name||'(unnamed)');
    const name = el('span','item-name', escHtml(displayName));
    name.style.cssText = 'min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;';
    row.appendChild(name);
    const badge = el('span','item-badge', exam.tbd ? 'TBD' : (exam.date||''));

    list.appendChild(row);
  });
}

function renderExamCalendar() {
  const cal = $id('exam-calendar');
  if (!cal) return;
  cal.innerHTML = '';

  const allExams = S.data.exams||[];
  if (!allExams.length) return; // Hide calendar entirely when no exams

  // Separate TBD vs dated exams
  const tbdExams = [], datedExams = [];
  allExams.forEach(ex => { if (ex.tbd) tbdExams.push(ex); else if (ex.date) datedExams.push(ex); });

  // Build set of months (year*12+month) that have exams
  const examMonths = new Set();
  const examMap = {};
  datedExams.forEach(ex => {
    const d = new Date(ex.date+'T00:00:00');
    if (!isNaN(d)) examMonths.add(d.getFullYear()*12 + d.getMonth());
    if(!examMap[ex.date]) examMap[ex.date]=[];
    examMap[ex.date].push(ex);
  });

  // Sort exam months and build navigable range (first exam month to last, inclusive)
  const sortedMonths = [...examMonths].sort((a,b)=>a-b);
  let minMonth = sortedMonths.length ? sortedMonths[0] : S.examCalYear*12+S.examCalMonth;
  let maxMonth = sortedMonths.length ? sortedMonths[sortedMonths.length-1] : minMonth;

  // If there are dated exams, constrain calendar to the range
  if (sortedMonths.length) {
    const cur = S.examCalYear*12 + S.examCalMonth;
    if (cur < minMonth || cur > maxMonth) {
      // Snap to nearest boundary
      const nearest = cur < minMonth ? minMonth : maxMonth;
      S.examCalYear = Math.floor(nearest/12);
      S.examCalMonth = nearest%12;
    }
  }

  const year = S.examCalYear, month = S.examCalMonth;
  const curKey = year*12+month;
  const monthNames = ['January','February','March','April','May','June','July','August','September','October','November','December'];

  // Nav — enable prev/next within the range [minMonth, maxMonth]
  const nav = el('div','cal-nav');
  const prevBtn = el('button',null,'◀');
  if (curKey > minMonth) {
    prevBtn.onclick = () => {
      S.examCalMonth--; if(S.examCalMonth<0){S.examCalMonth=11;S.examCalYear--;}
      renderExamCalendar();
    };
  } else { prevBtn.disabled=true; prevBtn.style.opacity='0.3'; }
  const nextBtn = el('button',null,'▶');
  if (curKey < maxMonth) {
    nextBtn.onclick = () => {
      S.examCalMonth++; if(S.examCalMonth>11){S.examCalMonth=0;S.examCalYear++;}
      renderExamCalendar();
    };
  } else { nextBtn.disabled=true; nextBtn.style.opacity='0.3'; }
  const title = el('span',null,`${monthNames[month]} ${year}`);
  nav.append(prevBtn, title, nextBtn);
  cal.appendChild(nav);

  // Grid
  const grid = el('div','cal-grid');
  ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].forEach(d => grid.appendChild(el('div','cal-hdr',d)));

  const firstDay = new Date(year, month, 1).getDay();
  const daysInMonth = new Date(year, month+1, 0).getDate();
  const prevDays = new Date(year, month, 0).getDate();

  // Previous month padding
  for (let i = firstDay-1; i >= 0; i--) {
    const d = el('div','cal-day other-month');
    d.innerHTML = `<div class="day-num">${prevDays-i}</div>`;
    grid.appendChild(d);
  }

  // Current month
  for (let day = 1; day <= daysInMonth; day++) {
    const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
    const examsOnDay = examMap[dateStr]||[];
    const d = el('div','cal-day'+(examsOnDay.length?' has-exam':''));
    let html = `<div class="day-num">${day}</div>`;
    examsOnDay.forEach(ex => {
      const calLabel = ex.course_name ? `${ex.course_name}: ${ex.name}` : ex.name;
      html += `<span class="cal-exam-label" onclick="S.examSelId='${ex.id}';renderExamsTab();" title="${escHtml(calLabel)}">${escHtml(calLabel)}</span>`;
    });
    d.innerHTML = html;
    grid.appendChild(d);
  }

  // Next month padding
  const totalCells = firstDay + daysInMonth;
  const remaining = (7 - totalCells % 7) % 7;
  for (let i = 1; i <= remaining; i++) {
    const d = el('div','cal-day other-month');
    d.innerHTML = `<div class="day-num">${i}</div>`;
    grid.appendChild(d);
  }

  cal.appendChild(grid);

  // TBD exams list below calendar
  if (tbdExams.length) {
    const tbdDiv = el('div');
    tbdDiv.style.cssText = 'margin-top:12px;padding:8px 12px;background:#fffbeb;border:1px solid #fcd34d;border-radius:6px;';
    tbdDiv.appendChild(el('strong',null,'TBD Exams'));
    const ul = document.createElement('ul');
    ul.style.cssText = 'padding-left:18px;margin-top:4px;font-size:14px;';
    tbdExams.forEach(ex => {
      const li = document.createElement('li');
      li.style.cssText = 'margin-bottom:2px;cursor:pointer;';
      li.textContent = ex.name + (ex.course_name ? ` (${ex.course_name})` : '');
      li.onclick = () => { S.examSelId = ex.id; renderExamsTab(); };
      ul.appendChild(li);
    });
    tbdDiv.appendChild(ul);
    cal.appendChild(tbdDiv);
  }
}

function clearProctorAssignments() {
  S.data.proctor_assignments = (S.data.proctor_assignments||[]).filter(a=>a.locked);
  S.proctorDiag = {}; S.proctorStatus = null;
  markDirty(); renderProctoring();
}

async function runProctorSolver() {
  const btn = document.querySelector('.btn-run-proctor');
  btn.textContent = '⏳ Solving…'; btn.disabled = true;
  try {
    const r = await fetch('/api/schedule-proctoring', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify(S.data)
    });
    const result = await r.json();
    if (result.status === 'error') {
      alert('Solver error:\n' + result.message);
    } else {
      S.data.proctor_assignments = result.proctor_assignments;
      markDirty();
      renderProctoring(result.diagnostics, result.status);
    }
  } catch(e) { alert('Proctoring solver failed: ' + e); }
  btn.textContent = '▶ Assign Proctors'; btn.disabled = false;
}

function updateProctorPETotals() {
  const peDiv = $id('proctor-pe-total');
  if (!peDiv) return;
  const exams = S.data.exams||[];
  const examPE = exams.reduce((s,e)=>s+(e.pe_value||0)*(e.proctor_count||1), 0);
  const outsidePE = S.data.tas.reduce((s,ta)=>
    s + (ta.outside_proctoring||[]).reduce((ss,op)=>ss+(op.pe_value||0), 0), 0);
  const totalRequiredPE = examPE + outsidePE;
  const totalAvailablePE = S.data.tas.reduce((s,t)=>s+(t.max_pe??2.0), 0);

  let totalLine = `<strong>Total Required PE:</strong> ${totalRequiredPE.toFixed(1)}`;
  if (outsidePE > 0) {
    totalLine += ` (${examPE.toFixed(1)} from exams, ${outsidePE.toFixed(1)} from outside proctoring)`;
  }
  peDiv.style.cssText = 'margin:8px 0;font-size:13px;';
  peDiv.innerHTML = totalLine + '<br>' +
    `<strong>PE Available from TAs:</strong> ${totalAvailablePE.toFixed(1)}`;
}

function renderProctoring(diag, status) {
  if (diag !== undefined) { S.proctorDiag = diag||{}; S.proctorStatus = status||null; }
  diag = S.proctorDiag; status = S.proctorStatus;

  const diagDiv = $id('proctor-diagnostics');
  const unfilled = diag.unfilled_proctors||[];
  if (status === 'partial' && unfilled.length) {
    let html = '<h4 style="color:#92400e;">⚠ Partial Proctoring Schedule</h4>';
    html += '<p><strong>Slots not fully filled:</strong></p>' +
      '<ul style="margin:4px 0 0 0;padding-left:1.5em;">' +
      unfilled.map(u => `<li><strong>${escHtml(u.exam_name)}</strong>: ${u.assigned}/${u.required} filled</li>`).join('') + '</ul>';
    diagDiv.style.cssText = 'background:#fffbeb;border:1px solid #fcd34d;border-radius:6px;padding:12px;';
    diagDiv.innerHTML = html;
    diagDiv.style.display = 'block';
  } else {
    diagDiv.style.display = 'none';
  }

  const tbl = $id('proctor-table');
  tbl.innerHTML = '';
  if (S.proctorViewMode === 'grid') renderProctorGrid(tbl);
  else renderProctorExamView(tbl);

  updateProctorPETotals();
  renderOutsideProctoring();

  renderProctorTASummary($id('proctor-ta-summary'));
}

function renderProctorExamView(container) {
  const tasMap = Object.fromEntries(S.data.tas.map(t=>[t.id,t]));
  const exams = [...(S.data.exams||[])].sort((a,b) => {
    const aLabel = a.course_name ? (a.section ? `${a.course_name} ${a.section}` : a.course_name) : '—';
    const bLabel = b.course_name ? (b.section ? `${b.course_name} ${b.section}` : b.course_name) : '—';
    const cmp = aLabel.localeCompare(bLabel);
    if (cmp !== 0) return cmp;
    if (a.tbd && !b.tbd) return 1;
    if (!a.tbd && b.tbd) return -1;
    return (a.date||'').localeCompare(b.date||'') || (a.start_min||0)-(b.start_min||0);
  });
  if (!exams.length) { container.appendChild(el('p','help-text','No exams defined')); return; }

  const table = el('table','sched-table');
  const thead = el('thead'); const thr = el('tr');
  ['Course/Section','Exam','Date/Time','Count','PE','Assigned Proctors'].forEach(h => thr.appendChild(el('th',null,h)));
  thead.appendChild(thr); table.appendChild(thead);
  const tbody = el('tbody');

  exams.forEach(exam => {
    const tr = el('tr');
    const courseLabel = exam.course_name
      ? (exam.section ? `${exam.course_name} ${exam.section}` : exam.course_name)
      : '—';
    tr.appendChild(el('td',null,escHtml(courseLabel)));
    tr.appendChild(el('td',null,escHtml(exam.name)));
    tr.appendChild(el('td',null, exam.tbd ? 'TBD' : `${exam.date||'—'} ${fmtRange(exam.start_min||0, exam.end_min||0)}`));

    const assigns = (S.data.proctor_assignments||[]).filter(a=>a.exam_id===exam.id);
    tr.appendChild(el('td',null,`${assigns.length}/${exam.proctor_count||1}`));
    tr.appendChild(el('td',null,(exam.pe_value||0).toFixed(1)));

    const assignCell = el('td');
    const roleDiv = el('div','role-cell role-chips-area');
    roleDiv.dataset.examId = exam.id;
    assigns.forEach(a => {
      const ta = tasMap[a.ta_id];
      const chip = el('div',`ta-chip${a.locked?' locked':''}`);
      chip.innerHTML = escHtml(ta?.name||a.ta_id);
      chip.draggable = true;
      chip.addEventListener('dragstart', e => {
        _dragProctorAssignment = {assignment: a, sourceExamId: exam.id};
        chip.classList.add('dragging');
        e.dataTransfer.effectAllowed = 'move';
      });
      chip.addEventListener('dragend', () => chip.classList.remove('dragging'));
      const lockBtn = el('span','lock-btn', a.locked?'🔒':'🔓');
      lockBtn.title = a.locked?'Unlock':'Lock';
      lockBtn.onclick = () => { a.locked=!a.locked; markDirty(); renderProctoring(); };
      const rmBtn = el('span','rm-btn','×');
      rmBtn.title = 'Remove';
      rmBtn.onclick = () => {
        S.data.proctor_assignments = S.data.proctor_assignments.filter(x=>x!==a);
        markDirty(); renderProctoring();
      };
      chip.append(lockBtn, rmBtn);
      roleDiv.appendChild(chip);
    });
    roleDiv.addEventListener('dragover', e => {
      if (!_dragProctorAssignment) return;
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      roleDiv.classList.add('drag-over');
    });
    roleDiv.addEventListener('dragleave', () => roleDiv.classList.remove('drag-over'));
    roleDiv.addEventListener('drop', e => {
      e.preventDefault();
      roleDiv.classList.remove('drag-over');
      if (!_dragProctorAssignment) return;
      const {assignment, sourceExamId} = _dragProctorAssignment;
      _dragProctorAssignment = null;
      const destExamId = roleDiv.dataset.examId;
      if (destExamId === sourceExamId) return;
      // check TA not already assigned to dest exam
      const alreadyThere = (S.data.proctor_assignments||[]).some(x => x.exam_id===destExamId && x.ta_id===assignment.ta_id);
      if (alreadyThere) return;
      assignment.exam_id = destExamId;
      markDirty(); renderProctoring();
    });
    const addBtn = el('button','add-ta-btn','+ TA');
    addBtn.onclick = () => openProctorAssignModal(exam);
    roleDiv.appendChild(addBtn);
    assignCell.appendChild(roleDiv);
    tr.appendChild(assignCell);
    tbody.appendChild(tr);
  });

  table.appendChild(tbody);
  container.appendChild(table);
}

    peInp.onchange = () => { ta.max_pe=parseFloat(peInp.value)||0; markDirty(); updateProctorPETotals(); };
    peTd.appendChild(peInp);
    tr.appendChild(peTd);

    tr.appendChild(el('td',null,usedPE.toFixed(1)));

      const role = rolesMap[a.role_id];

      chip.textContent = (displayName(lab)||a.lab_id) + ' / ' + (role?.label||a.role_id);

    });

    const examsCell = el('td');
    taProctorAssigns.forEach(a => {
      const exam = examsMap[a.exam_id];

      const courseLabel = exam ? (exam.course_name ? (exam.section ? `${exam.course_name} ${exam.section}` : exam.course_name) : '') : '';
      chip.textContent = (courseLabel ? `${courseLabel} — ` : '') + (exam?.name||a.exam_id) + (a.locked?' 🔒':'');
      examsCell.appendChild(chip);

    tbody.appendChild(tr);
  });

  table.appendChild(tbody);
  const wrapPS = el('div','sched-table-wrap'); wrapPS.appendChild(table); container.appendChild(wrapPS);
}

function openProctorAssignModal(exam) {
  const existing = new Set(
    (S.data.proctor_assignments||[]).filter(a=>a.exam_id===exam.id).map(a=>a.ta_id)
  );

  function usedPE(ta) {
    return (S.data.proctor_assignments||[]).filter(a=>a.ta_id===ta.id).reduce((sum,a) => {
      const ex = (S.data.exams||[]).find(e=>e.id===a.exam_id);
      return sum + (ex?.pe_value||0);
    }, 0);
  }

  // Get exam weekday (skip date-based checks for TBD exams)
  let examWd = null;
  const hasDates = !exam.tbd && exam.date;
  if (hasDates) {
    try { examWd = new Date(exam.date+'T00:00:00').getDay(); examWd = [6,0,1,2,3,4,5][examWd]; } catch(e) {}
  }
  // Convert JS getDay (0=Sun) to our model (0=Mon): Sun=6,Mon=0,Tue=1...

  const eligible = [], conflicted = [];

  S.data.tas.forEach(ta => {
    if (existing.has(ta.id)) return;
    const reasons = [];
    const addPE = exam.pe_value||1.0;
    if (usedPE(ta) + addPE > (ta.max_pe??2.0) + 0.001) {
      reasons.push(`PE: ${(usedPE(ta)+addPE).toFixed(1)}/${Number(ta.max_pe??2.0).toFixed(1)} (over cap)`);
    }
    // Check time conflicts with other proctored exams on same date (skip for TBD)
    if (hasDates) (S.data.proctor_assignments||[]).filter(a=>a.ta_id===ta.id).forEach(a => {
      const otherExam = (S.data.exams||[]).find(e=>e.id===a.exam_id);
      if (otherExam && otherExam.date===exam.date && overlap(exam.start_min, exam.end_min, otherExam.start_min, otherExam.end_min)) {
        reasons.push(`conflicts with ${otherExam.name}`);
      }
    });
    // Check grad course conflicts
    if (examWd !== null) {
      for (const gcId of (ta.grad_course_ids||[])) {
        const gc = S.data.grad_courses.find(c=>c.id===gcId);
        if (!gc) continue;
        const gcMtgs = gc.meetings?.length ? gc.meetings : (gc.day!==undefined?[{day:gc.day,start_min:gc.start_min,end_min:gc.end_min}]:[]);
        for (const m of gcMtgs) {
          if (m.day===examWd && overlap(exam.start_min, exam.end_min, m.start_min, m.end_min)) {
            const inRange = !gc.date_start || !gc.date_end ||
              (exam.date >= gc.date_start && exam.date <= gc.date_end);
            if (inRange) reasons.push(`conflicts with ${gc.name}`);
          }
        }
        // Check grad course exam conflicts
        if (hasDates) {
          for (const gcEx of (gc.exams||[])) {
            if (gcEx.date === exam.date && overlap(exam.start_min, exam.end_min, gcEx.start_min, gcEx.end_min)) {
              reasons.push(`conflicts with ${gc.name} exam`);
            }
          }
        }
      }
      // Check lab assignment conflicts
      S.data.assignments.filter(a=>a.ta_id===ta.id).forEach(a => {
        const lab = S.data.labs.find(l=>l.id===a.lab_id);
        if (!lab) return;
        const mtgs = lab.meetings?.length ? lab.meetings : (lab.day!==undefined?[{day:lab.day,start_min:lab.start_min,end_min:lab.end_min}]:[]);
        for (const m of mtgs) {
          if (m.day===examWd && overlap(exam.start_min, exam.end_min, m.start_min, m.end_min)) {
            const inRange = !lab.date_start || !lab.date_end ||
              (exam.date >= lab.date_start && exam.date <= lab.date_end);
            if (inRange) reasons.push(`conflicts with lab ${lab.name}`);
          }
        }
      });
      // Other commitments
      for (const oc of (ta.other_commitments||[])) {
        if (oc.day===examWd && overlap(exam.start_min, exam.end_min, oc.start_min, oc.end_min)) {
          reasons.push(`conflicts with commitment`);
        }
      }
    }
    if (reasons.length===0) eligible.push(ta);
    else conflicted.push({ta, reasons});
  });

  const html = `
    <div class="modal-box">
      <h2>Assign Proctor — ${escHtml(exam.name)}</h2>
      <div class="assign-ta-list" id="proctor-assign-list"></div>
      <div class="modal-footer">
        <button class="btn-sm" onclick="closeModal()">Close</button>
      </div>
    </div>`;
  showModal(html);

  const listDiv = $id('proctor-assign-list');

  function makeRow(ta, isAssigned, reasons) {
    const row = el('div','assign-ta-row');
    if (isAssigned) row.style.background = '#eff6ff';
    else if (reasons) row.style.background = '#fffbeb';
    const expBadge = el('span',`exp-badge${ta.experience!=='experienced'?' inexp':''}`,
                        ta.experience==='experienced'?'exp':'inexp');
    const name = el('span',null,escHtml(ta.name));
    const peInfo = el('span','se-info',`PE: ${usedPE(ta).toFixed(1)}/${Number(ta.max_pe??2.0).toFixed(1)}`);
    const checkmark = el('span',null, isAssigned?' ✓':'');
    checkmark.style.color = 'var(--green)';
    row.append(expBadge, name, checkmark, peInfo);
    if (reasons) {
      const reasonEl = el('div','help-text','⚠ '+reasons.join('; '));
      reasonEl.style.cssText='color:#b45309;font-size:0.78em;margin-top:2px;';
      row.appendChild(reasonEl); row.style.flexWrap='wrap';
    }
    row.onclick = () => {
      if (isAssigned) {
        S.data.proctor_assignments = S.data.proctor_assignments.filter(
          a=>!(a.exam_id===exam.id && a.ta_id===ta.id));
      } else {
        S.data.proctor_assignments = S.data.proctor_assignments||[];
        S.data.proctor_assignments.push({exam_id:exam.id, ta_id:ta.id, locked:true});
      }
      markDirty(); closeModal(); renderProctoring();
    };
    return row;
  }

  // Already assigned
  S.data.tas.filter(ta=>existing.has(ta.id)).forEach(ta => listDiv.appendChild(makeRow(ta,true,null)));
  eligible.forEach(ta => listDiv.appendChild(makeRow(ta,false,null)));
  if (conflicted.length) {
    const divider = el('div',null,'— or override conflict —');
    divider.style.cssText='text-align:center;color:#9ca3af;font-size:0.82em;padding:6px 0 4px;';
    listDiv.appendChild(divider);
    conflicted.forEach(({ta,reasons}) => listDiv.appendChild(makeRow(ta,false,reasons)));
  }
}

// CONFLICT-DETECTION HELPERS
// ════════════════════════════════════════════════════════════════
function taLabConflictReasons(ta, lab) {
  const reasons = [];
  const labMeetings = lab.meetings
    ? lab.meetings.map(m => [m.day, m.start_min, m.end_min])
    : (lab.day !== null && lab.start_min ? [[lab.day, lab.start_min, lab.end_min]] : []);

  // SE cap check
  const usedSE = S.data.assignments
    .filter(a => a.ta_id === ta.id)
    .reduce((sum, a) => {
      const r = S.data.roles.find(r2 => r2.id === a.role_id);
      return sum + (r?.se_value || 0);
    }, (ta.outside_duties || []).reduce((s, d) => s + d.se_value, 0));
  // (no role/SE value here since we don't know the role — caller may want to check separately)

  // Grad course conflicts
  for (const gcId of (ta.grad_course_ids || [])) {
    const gc = S.data.grad_courses.find(c => c.id === gcId);
    if (!gc) continue;
    const gcMeetings = gc.meetings
      ? gc.meetings.map(m => [m.day, m.start_min, m.end_min])
      : [[gc.day, gc.start_min, gc.end_min]];
    for (const [ld, ls, le] of labMeetings) {
      for (const [gd, gs, ge] of gcMeetings) {
        if (ld === gd && overlap(ls, le, gs, ge)) {
          reasons.push(`conflicts with ${gc.name}`);
        }
      }
    }
  }
  // Other commitment conflicts
  for (const oc of (ta.other_commitments || [])) {
    for (const [ld, ls, le] of labMeetings) {
      if (oc.day === ld && overlap(ls, le, oc.start_min, oc.end_min)) {
        reasons.push(`conflicts with commitment (${fmtTime(oc.start_min)}–${fmtTime(oc.end_min)})`);
      }
    }
  }
  return reasons;
}

function taExamConflictReasons(ta, exam) {
  const reasons = [];
  const hasDates = !exam.tbd && exam.date;
  let examWd = null;
  if (hasDates) {
    try { examWd = new Date(exam.date + 'T00:00:00').getDay(); examWd = [6,0,1,2,3,4,5][examWd]; } catch(e) {}
  }

  // PE cap check
  const usedPE = (S.data.proctor_assignments || []).filter(a => a.ta_id === ta.id).reduce((sum, a) => {
    const ex = (S.data.exams || []).find(e => e.id === a.exam_id);
    return sum + (ex?.pe_value || 0);
  }, 0);
  const addPE = exam.pe_value || 1.0;
  if (usedPE + addPE > (ta.max_pe ?? 2.0) + 0.001) {
    reasons.push(`PE: ${(usedPE + addPE).toFixed(1)}/${Number(ta.max_pe ?? 2.0).toFixed(1)} (over cap)`);
  }

  // Time conflicts with other proctored exams
  if (hasDates) {
    (S.data.proctor_assignments || []).filter(a => a.ta_id === ta.id).forEach(a => {
      const otherExam = (S.data.exams || []).find(e => e.id === a.exam_id);
      if (otherExam && otherExam.date === exam.date && overlap(exam.start_min, exam.end_min, otherExam.start_min, otherExam.end_min)) {
        reasons.push(`conflicts with ${otherExam.name}`);
      }
    });
  }

  if (examWd !== null) {
    // Grad course conflicts
    for (const gcId of (ta.grad_course_ids || [])) {
      const gc = S.data.grad_courses.find(c => c.id === gcId);
      if (!gc) continue;
      const gcMtgs = gc.meetings?.length ? gc.meetings : (gc.day !== undefined ? [{day:gc.day, start_min:gc.start_min, end_min:gc.end_min}] : []);
      for (const m of gcMtgs) {
        if (m.day === examWd && overlap(exam.start_min, exam.end_min, m.start_min, m.end_min)) {
          const inRange = !gc.date_start || !gc.date_end || (exam.date >= gc.date_start && exam.date <= gc.date_end);
          if (inRange) reasons.push(`conflicts with ${gc.name}`);
        }
      }
      if (hasDates) {
        for (const gcEx of (gc.exams || [])) {
          if (gcEx.date === exam.date && overlap(exam.start_min, exam.end_min, gcEx.start_min, gcEx.end_min)) {
            reasons.push(`conflicts with ${gc.name} exam`);
          }
        }
      }
    }
    // Lab assignment conflicts
    S.data.assignments.filter(a => a.ta_id === ta.id).forEach(a => {
      const lab = S.data.labs.find(l => l.id === a.lab_id);
      if (!lab) return;
      const mtgs = lab.meetings?.length ? lab.meetings : (lab.day !== undefined ? [{day:lab.day, start_min:lab.start_min, end_min:lab.end_min}] : []);
      for (const m of mtgs) {
        if (m.day === examWd && overlap(exam.start_min, exam.end_min, m.start_min, m.end_min)) {
          const inRange = !lab.date_start || !lab.date_end || (exam.date >= lab.date_start && exam.date <= lab.date_end);
          if (inRange) reasons.push(`conflicts with lab ${lab.name}`);
        }
      }
    });
    // Other commitment conflicts
    for (const oc of (ta.other_commitments || [])) {
      if (oc.day === examWd && overlap(exam.start_min, exam.end_min, oc.start_min, oc.end_min)) {
        reasons.push(`conflicts with commitment`);
      }
    }
  }
  return reasons;
}

// GRID VIEWS
// ════════════════════════════════════════════════════════════════
function renderScheduleGrid(container) {
  container.innerHTML = '';
  const cols = [];
  const sortedLabs = [...S.data.labs].sort((a, b) => (a.name || '').localeCompare(b.name || ''));
  for (const lab of sortedLabs) {
    for (const rq of (lab.roles || [])) {
      if (!rq.count) continue;
      const role = S.data.roles.find(r => r.id === rq.role_id);
      if (!role) continue;
      cols.push({ lab, role, rq });
    }
  }
  if (!cols.length) { container.innerHTML = '<p style="color:var(--text2)">No lab roles configured.</p>'; return; }

  const tas = [...S.data.tas].sort((a, b) => (a.name || '').localeCompare(b.name || ''));
  if (!tas.length) { container.innerHTML = '<p style="color:var(--text2)">No TAs configured.</p>'; return; }

  const tbl = document.createElement('table');
  tbl.className = 'assign-grid';

  // Header row
  const thead = tbl.createTHead();
  const hrow = thead.insertRow();
  const thName = document.createElement('th');
  thName.className = 'ta-name-col';
  thName.textContent = '';
  hrow.appendChild(thName);

  for (const col of cols) {
    const th = document.createElement('th');
    th.style.cssText = 'vertical-align:bottom; padding:4px; position:sticky; top:0; background:var(--panel); z-index:1;';
    const div = document.createElement('div');
    div.className = 'col-header';
    div.title = `${displayName(col.lab)} (${col.role.label})`;
    div.innerHTML = `${displayName(col.lab)}<br><span style="opacity:0.7">${col.role.label}</span>`;
    th.appendChild(div);
    hrow.appendChild(th);
  }

  // Body rows
  const tbody = tbl.createTBody();
  for (const ta of tas) {
    const row = tbody.insertRow();
    const tdName = row.insertCell();
    tdName.className = 'ta-name-col';
    tdName.textContent = ta.name || '(unnamed)';

    for (const col of cols) {
      const td = row.insertCell();
      td.className = 'assign-cell';

      const asgn = S.data.assignments.find(a => a.lab_id === col.lab.id && a.role_id === col.role.id && a.ta_id === ta.id);
      const conflicts = !asgn ? taLabConflictReasons(ta, col.lab) : [];

      if (asgn) {
        td.classList.add(asgn.locked ? 'cell-locked' : 'cell-assigned');
        // Remove button
        const rm = document.createElement('span');
        rm.className = 'cell-rm';
        rm.textContent = '×';
        rm.title = 'Remove assignment';
        rm.onclick = (e) => {
          e.stopPropagation();
          S.data.assignments = S.data.assignments.filter(a => !(a.lab_id === col.lab.id && a.role_id === col.role.id && a.ta_id === ta.id));
          markDirty();
          renderSchedule();
        };
        td.appendChild(rm);
        if (asgn.locked) {
          const lk = document.createElement('span');
          lk.textContent = '🔒';
          lk.style.fontSize = '11px';
          td.appendChild(lk);
        } else {
          const lk = document.createElement('span');
          lk.textContent = '✓';
          lk.style.cssText = 'font-size:13px; color:#003D80;';
          td.appendChild(lk);
        }
        td.title = `${ta.name} → ${displayName(col.lab)} (${col.role.label})${asgn.locked ? ' [locked]' : ''}`;
        td.onclick = () => { asgn.locked = !asgn.locked; markDirty(); renderSchedule(); };
      } else {
        if (conflicts.length > 0) {
          td.classList.add('cell-conflict');
          td.title = conflicts.join('; ');
        } else {
          td.title = `Click to assign ${ta.name} → ${displayName(col.lab)} (${col.role.label})`;
        }
        td.onclick = () => {
          S.data.assignments.push({ lab_id: col.lab.id, role_id: col.role.id, ta_id: ta.id, locked: true });
          markDirty();
          renderSchedule();
        };
      }
    }
  }

  const gridWrap = document.createElement('div');
  gridWrap.className = 'assign-grid-wrap';
  gridWrap.appendChild(tbl);
  container.appendChild(gridWrap);
}

function renderProctorGrid(container) {
  container.innerHTML = '';
  const exams = [...(S.data.exams || [])].sort((a, b) => {
    const aLabel = a.course_name ? (a.section ? `${a.course_name} ${a.section}` : a.course_name) : '—';
    const bLabel = b.course_name ? (b.section ? `${b.course_name} ${b.section}` : b.course_name) : '—';
    const cmp = aLabel.localeCompare(bLabel);
    if (cmp !== 0) return cmp;
    if (a.tbd && !b.tbd) return 1;
    if (!a.tbd && b.tbd) return -1;
    return (a.date || '').localeCompare(b.date || '') || (a.start_min || 0) - (b.start_min || 0);
  });
  if (!exams.length) { container.innerHTML = '<p style="color:var(--text2)">No exams defined.</p>'; return; }

  const tas = [...S.data.tas].sort((a, b) => (a.name || '').localeCompare(b.name || ''));
  if (!tas.length) { container.innerHTML = '<p style="color:var(--text2)">No TAs configured.</p>'; return; }

  const tbl = document.createElement('table');
  tbl.className = 'assign-grid';

  // Header row
  const thead = tbl.createTHead();
  const hrow = thead.insertRow();
  const thName = document.createElement('th');
  thName.className = 'ta-name-col';
  thName.textContent = '';
  hrow.appendChild(thName);

  for (const exam of exams) {
    const th = document.createElement('th');
    th.style.cssText = 'vertical-align:bottom; padding:4px; position:sticky; top:0; background:var(--panel); z-index:1;';
    const courseLabel = exam.course_name ? (exam.section ? `${exam.course_name} ${exam.section}` : exam.course_name) : '—';
    const dateLabel = exam.tbd ? 'TBD' : (exam.date || '—');
    const timeLabel = (!exam.tbd && exam.start_min != null) ? fmtRange(exam.start_min, exam.end_min) : '';
    const line2 = [dateLabel, timeLabel].filter(Boolean).join(' ');
    const div = document.createElement('div');
    div.className = 'col-header';
    div.title = `${courseLabel}: ${exam.name} (${line2})`;
    div.innerHTML = `${courseLabel}: ${exam.name}<br><span style="opacity:0.7">${line2}</span>`;
    th.appendChild(div);
    hrow.appendChild(th);
  }

  // Body rows
  const tbody = tbl.createTBody();
  for (const ta of tas) {
    const row = tbody.insertRow();
    const tdName = row.insertCell();
    tdName.className = 'ta-name-col';
    tdName.textContent = ta.name || '(unnamed)';

    for (const exam of exams) {
      const td = row.insertCell();
      td.className = 'assign-cell';

      const asgn = (S.data.proctor_assignments || []).find(a => a.exam_id === exam.id && a.ta_id === ta.id);
      const conflicts = !asgn ? taExamConflictReasons(ta, exam) : [];

      if (asgn) {
        td.classList.add(asgn.locked ? 'cell-locked' : 'cell-assigned');
        const rm = document.createElement('span');
        rm.className = 'cell-rm';
        rm.textContent = '×';
        rm.title = 'Remove assignment';
        rm.onclick = (e) => {
          e.stopPropagation();
          S.data.proctor_assignments = S.data.proctor_assignments.filter(a => !(a.exam_id === exam.id && a.ta_id === ta.id));
          markDirty();
          renderProctoring();
        };
        td.appendChild(rm);
        if (asgn.locked) {
          const lk = document.createElement('span');
          lk.textContent = '🔒';
          lk.style.fontSize = '11px';
          td.appendChild(lk);
        } else {
          const lk = document.createElement('span');
          lk.textContent = '✓';
          lk.style.cssText = 'font-size:13px; color:#003D80;';
          td.appendChild(lk);
        }
        const courseLabel = exam.course_name ? (exam.section ? `${exam.course_name} ${exam.section}` : exam.course_name) : '—';
        td.title = `${ta.name} → ${courseLabel}: ${exam.name}${asgn.locked ? ' [locked]' : ''}`;
        td.onclick = () => { asgn.locked = !asgn.locked; markDirty(); renderProctoring(); };
      } else {
        if (conflicts.length > 0) {
          td.classList.add('cell-conflict');
          td.title = conflicts.join('; ');
        } else {
          const courseLabel = exam.course_name ? (exam.section ? `${exam.course_name} ${exam.section}` : exam.course_name) : '—';
          td.title = `Click to assign ${ta.name} → ${courseLabel}: ${exam.name}`;
        }
        td.onclick = () => {
          S.data.proctor_assignments = S.data.proctor_assignments || [];
          S.data.proctor_assignments.push({ exam_id: exam.id, ta_id: ta.id, locked: true });
          markDirty();
          renderProctoring();
        };
      }
    }
  }

  const gridWrap = document.createElement('div');
  gridWrap.className = 'assign-grid-wrap';
  gridWrap.appendChild(tbl);
  container.appendChild(gridWrap);
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function showHelpModal() {
  const html = `
    <div class="modal-box" style="min-width:560px;">
      <h2>TA Scheduler — Help</h2>
      <div class="help-modal">
        <h3>Import Class List</h3>
        <p>Use the <strong>Import Class List</strong> button to load courses and lab sections from a
        departmental class list CSV. These can be obtained from
        <a href="https://www.apps.miamioh.edu/courselist/" target="_blank">apps.miamioh.edu/courselist</a>.
        Graduate courses are imported into the Graduate Courses tab; undergraduate sections
        are grouped by course number and imported into Lab Sections.</p>

        <h3>Lab Sections</h3>
        <p>Define undergraduate lab sections. For each lab, set the meeting time on the
        grid and configure how many TAs each role requires. Labs drive the scheduling.</p>

        <h3>Graduate Courses</h3>
        <p>Add graduate courses taken by TAs. Meeting times entered here are used to
        detect scheduling conflicts when assigning TAs to labs.</p>

        <h3>TAs</h3>
        <p>Add graduate TAs. Set experience level, maximum SE load, the grad courses
        they take, and any fixed commitments (blocks on the grid).</p>

        <h3>Exams</h3>
        <p>Define exam sessions for proctoring. Set date, time, PE value, and number
        of proctors needed. Exams can also be imported from a class list CSV. The
        calendar shows exams by month.</p>

        <h3>Schedule Labs</h3>
        <p>Use <strong>Assign TAs</strong> to auto-fill open slots, or use <strong>+ TA</strong> to assign manually.
        Lock assignments you want to keep; the solver won't overwrite locked slots.
        Switch between Lab View and TA View. Add outside duties (grading etc.) that count
        toward SE but have no meeting time. Export DOCX when done.</p>

        <h3>Schedule Proctoring</h3>
        <p>Use <strong>Assign Proctors</strong> to auto-fill exam proctoring slots.
        The solver respects PE caps and avoids time conflicts with labs, grad courses,
        and other commitments. TAs familiar with a course get a scoring bonus.</p>

        <h3>Meeting Finder</h3>
        <p>Heatmap showing when assigned TAs are busy across the week. Green = all
        free, yellow = some busy, red = all busy. Useful for scheduling meetings.</p>

        <h3>Key Concepts</h3>
        <ul>
          <li><strong>SE (Section Equivalent):</strong> unit of TA workload. A typical lab = 1.0 SE.</li>
          <li><strong>PE (Proctoring Equivalent):</strong> unit of proctoring workload. Independent from SE.</li>
          <li><strong>Experienced / Inexperienced:</strong> controls experience-preference soft constraints.</li>
          <li><strong>Locked assignments:</strong> preserved by the solver; unlocked ones can be replaced.</li>
          <li><strong>Outside duties:</strong> SE-consuming responsibilities with no fixed meeting time.</li>
        </ul>
      </div>
      <div class="modal-footer">
        <button class="btn-sm btn-primary" onclick="closeModal()">Close</button>
      </div>
    </div>`;
  showModal(html);
}

// Keyboard shortcuts
document.addEventListener('keydown', e => {
  if ((e.ctrlKey||e.metaKey) && e.key==='s') { e.preventDefault(); saveData(); }
  if (e.key==='Escape') closeModal();
});
